<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playlist Forge</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,700;1,500&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#09080a;color:#ede0c8;font-family:'Outfit',sans-serif;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const SPOTIFY_ACCOUNTS = "https://accounts.spotify.com";
const SPOTIFY_API      = "https://api.spotify.com/v1";
const REDIRECT_URI     = "https://example.com";
const SCOPES           = "playlist-modify-public playlist-modify-private";

// ── PKCE ──────────────────────────────────────────────────
function genVerifier(len=128){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
  return Array.from(crypto.getRandomValues(new Uint8Array(len))).map(x=>chars[x%chars.length]).join("");
}
async function genChallenge(v){
  const digest=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
function parseCode(url){
  const m=url.match(/[?&]code=([^&#\s]+)/);
  return m?m[1]:url.trim();
}

// ── Spotify ────────────────────────────────────────────────
async function exchangeToken(code,verifier,clientId){
  const body=new URLSearchParams({client_id:clientId,grant_type:"authorization_code",code,redirect_uri:REDIRECT_URI,code_verifier:verifier});
  const opts={method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body};
  const res=await fetch(`${SPOTIFY_ACCOUNTS}/api/token`,opts);
  const text=await res.text();
  try{ return JSON.parse(text); }
  catch(e){ throw new Error(`Token exchange failed (${res.status}): ${text.slice(0,120)}`); }
}
async function safeJson(res){
  const text=await res.text();
  try{ return JSON.parse(text); }
  catch(e){ throw new Error(`Spotify returned non-JSON (${res.status}): ${text.slice(0,120)}`); }
}
async function sGet(path,token){
  const res=await fetch(`${SPOTIFY_API}${path}`,{headers:{Authorization:`Bearer ${token}`}});
  return safeJson(res);
}
async function sPost(path,body,token){
  const res=await fetch(`${SPOTIFY_API}${path}`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body)});
  return safeJson(res);
}
async function searchTrack(artist,title,token){
  const q=encodeURIComponent(`artist:${artist} track:${title}`);
  const d=await sGet(`/search?q=${q}&type=track&limit=1`,token);
  return d.tracks?.items?.[0]||null;
}
async function callGroq(prompt){
  const apiKey=localStorage.getItem("groq_key")||"";
  if(!apiKey)throw new Error("No Groq API key — go back to Setup.");
  const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
    body:JSON.stringify({
      model:"llama-3.3-70b-versatile",
      max_tokens:1000,
      messages:[{role:"user",content:`Create a playlist of 15 diverse songs for: "${prompt}"

RESPOND WITH ONLY A JSON ARRAY. Start with [ and end with ]. No text before or after.
[{"artist":"Artist Name","title":"Song Title"},...]`}]
    })
  });
  const d=await res.json();
  if(d.error)throw new Error("Groq error: "+(d.error.message||JSON.stringify(d.error)));
  const raw=d.choices?.[0]?.message?.content||"";
  const match=raw.match(/\[[\s\S]*\]/);
  if(!match)throw new Error("Unexpected response: "+raw.slice(0,100));
  try{ return JSON.parse(match[0]); }
  catch(e){ throw new Error("Could not parse song list: "+raw.slice(0,100)); }
}

// ── Design ─────────────────────────────────────────────────
const C={bg:"#09080a",surface:"#141214",card:"#1d1a1e",border:"#2a2530",gold:"#c9a84c",goldLight:"#e8c96e",text:"#ede0c8",muted:"#7a6f6a",success:"#6dbf7a",miss:"#5a5560",error:"#e06060",green:"#1db954"};

function Inp({value,onChange,placeholder,multiline,mono}){
  const s={background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontFamily:mono?"'DM Mono',monospace":"'Outfit',sans-serif",fontSize:mono?13:15,padding:"13px 16px",width:"100%",boxSizing:"border-box",outline:"none",transition:"border-color 0.2s"};
  const on=e=>e.target.style.borderColor=C.gold,off=e=>e.target.style.borderColor=C.border;
  return multiline
    ?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={4} style={{...s,resize:"vertical",lineHeight:1.6}} onFocus={on} onBlur={off}/>
    :<input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={s} onFocus={on} onBlur={off}/>;
}
function Btn({children,onClick,disabled,outline,isGreen,style={}}){
  const [h,setH]=useState(false);
  const bg=outline?"transparent":isGreen?(h?"#17a349":C.green):(h&&!disabled?C.goldLight:C.gold);
  return <button onClick={onClick} disabled={disabled} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{background:bg,border:outline?`1px solid ${C.border}`:"none",color:outline?C.muted:isGreen?"#fff":"#09080a",fontFamily:"'Outfit',sans-serif",fontWeight:600,fontSize:15,padding:"13px 24px",borderRadius:10,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.45:1,transition:"all 0.18s",letterSpacing:"0.02em",...style}}>{children}</button>;
}
function Lbl({children}){return <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:C.gold,marginBottom:8}}>{children}</div>;}
function Card({children,style={}}){return <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"20px 24px",...style}}>{children}</div>;}
function NumList({items}){
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    {items.map((item,i)=>(
      <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        <div style={{width:24,height:24,borderRadius:"50%",background:C.bg,border:`1px solid ${C.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:C.gold,flexShrink:0,marginTop:1}}>{i+1}</div>
        <div style={{fontSize:14,color:C.text,lineHeight:1.65}}>{item}</div>
      </div>
    ))}
  </div>;
}
function VinylBg(){
  return <div style={{position:"fixed",top:-80,right:-100,opacity:0.055,pointerEvents:"none",zIndex:0}}>
    <svg width="480" height="480" viewBox="0 0 480 480">
      {[220,175,130,90,55,25].map(r=><circle key={r} cx="240" cy="240" r={r} fill="none" stroke={C.gold} strokeWidth="1"/>)}
      <circle cx="240" cy="240" r="18" fill={C.gold} opacity="0.6"/>
      <circle cx="240" cy="240" r="7" fill={C.bg}/>
    </svg>
  </div>;
}
const ALL_STEPS=["setup","auth","prompt","generating","result"];
function Dots({current}){
  const i=ALL_STEPS.indexOf(current);
  return <div style={{display:"flex",gap:7}}>{ALL_STEPS.slice(0,4).map((_,j)=><div key={j} style={{width:j===i?22:7,height:7,borderRadius:4,background:j<=i?C.gold:C.border,transition:"all 0.3s"}}/>)}</div>;
}
function Shell({step,children,onReset}){
  return <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Outfit',sans-serif",position:"relative",overflowX:"hidden"}}>
    <VinylBg/>
    <div style={{position:"relative",zIndex:1,maxWidth:560,margin:"0 auto",padding:"28px 18px 60px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:40}}>
        <div>
          <div style={{fontFamily:"'Cormorant',serif",fontSize:20,fontWeight:700,letterSpacing:"0.05em",color:C.gold}}>PLAYLIST FORGE</div>
          <div style={{fontSize:10,color:C.muted,letterSpacing:"0.1em"}}>POWERED BY SPOTIFY + CLAUDE</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <Dots current={step}/>
          {step!=="setup"&&<button onClick={onReset} style={{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer",fontFamily:"'Outfit',sans-serif",padding:"4px 0",borderBottom:`1px solid ${C.border}`}}>↺ restart</button>}
        </div>
      </div>
      {children}
    </div>
  </div>;
}

// ── Step 1: Setup ──────────────────────────────────────────
function StepSetup({onNext}){
  const [clientId,setClientId]=useState(localStorage.getItem("sp_client_id")||"");
  const [apiKey,setApiKey]=useState(localStorage.getItem("groq_key")||"");
  const go=()=>{localStorage.setItem("sp_client_id",clientId.trim());localStorage.setItem("groq_key",apiKey.trim());onNext(clientId.trim());};
  return <div>
    <h1 style={{fontFamily:"'Cormorant',serif",fontSize:38,fontWeight:700,margin:"0 0 10px",lineHeight:1.1}}>Connect<br/><em style={{color:C.gold}}>Spotify</em></h1>
    <p style={{color:C.muted,fontSize:15,marginBottom:28,lineHeight:1.6}}>You need a free Spotify Developer app. Your paid subscription is not needed — just your Spotify account.</p>
    <Card style={{marginBottom:24}}>
      <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.1em",color:C.muted,marginBottom:16}}>ONE-TIME SETUP · ~2 MINUTES</div>
      <NumList items={[
        <span>Go to <a href="https://developer.spotify.com/dashboard" target="_blank" rel="noreferrer" style={{color:C.gold,textDecoration:"none",borderBottom:`1px solid ${C.gold}`}}>developer.spotify.com/dashboard</a> and log in</span>,
        <span>Tap <b style={{color:C.text}}>"Create app"</b> — fill any name &amp; description</span>,
        <span>Set <b style={{color:C.goldLight}}>Redirect URI</b> to:<br/>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:C.goldLight,background:C.bg,padding:"4px 10px",borderRadius:6,display:"inline-block",marginTop:6}}>https://example.com</span><br/>
          <span style={{fontSize:13,color:C.muted,marginTop:4,display:"block"}}>⚠️ Tap <b style={{color:C.text}}>Add</b>, then <b style={{color:C.text}}>Save</b>.</span>
        </span>,
        <span>Copy your <b style={{color:C.text}}>Client ID</b> from the top of the app page and paste below</span>,
      ]}/>
    </Card>
    <div style={{marginBottom:22}}><Lbl>Client ID</Lbl><Inp value={clientId} onChange={setClientId} placeholder="Paste your 32-character Client ID" mono/></div>
    <div style={{marginBottom:8}}><Lbl>Groq API Key</Lbl><Inp value={apiKey} onChange={setApiKey} placeholder="gsk_..." mono/></div>
    <div style={{marginBottom:24,padding:"10px 14px",background:"#0f130f",borderRadius:8,border:`1px solid ${C.border}`,fontSize:12,color:C.muted,lineHeight:1.6}}>
      🔒 Your API key is stored only in your browser — never in the app code or GitHub.<br/>
      Get one free at <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:C.gold}}>console.anthropic.com</a>
    </div>
    <Btn onClick={go} disabled={clientId.trim().length<10||apiKey.trim().length<10}>Continue →</Btn>
  </div>;
}

// ── Step 2: Auth ───────────────────────────────────────────
function StepAuth({clientId,onSuccess}){
  const [authUrl,setAuthUrl]=useState(localStorage.getItem("sp_auth_url")||"");
  const [codeInput,setCodeInput]=useState("");
  const [error,setError]=useState("");
  const [verifying,setVerifying]=useState(false);
  const linkReady=!!authUrl;

  const generateLink=async()=>{
    const verifier=genVerifier();
    const challenge=await genChallenge(verifier);
    const id=clientId||localStorage.getItem("sp_client_id")||"";
    const params=new URLSearchParams({client_id:id,response_type:"code",redirect_uri:REDIRECT_URI,code_challenge_method:"S256",code_challenge:challenge,scope:SCOPES});
    const url=`${SPOTIFY_ACCOUNTS}/authorize?${params}`;
    localStorage.setItem("sp_verifier",verifier);
    localStorage.setItem("sp_client_id",id);
    localStorage.setItem("sp_auth_url",url);
    setAuthUrl(url);
  };

  const handleVerify=async()=>{
    setError("");setVerifying(true);
    const code=parseCode(codeInput);
    const verifier=localStorage.getItem("sp_verifier");
    const id=localStorage.getItem("sp_client_id")||clientId;
    if(!code||code.length<10){setError("Paste the full URL from the address bar — it must contain '?code='");setVerifying(false);return;}
    if(!verifier){setError("Session expired — tap 'Generate Login Link' again.");setVerifying(false);return;}
    try{
      const tok=await exchangeToken(code,verifier,id);
      if(tok.error)throw new Error(tok.error_description||tok.error);
      const user=await sGet("/me",tok.access_token);
      if(user.error)throw new Error(user.error.message);
      ["sp_verifier","sp_auth_url"].forEach(k=>localStorage.removeItem(k));
      onSuccess(tok.access_token,user.id);
    }catch(e){
      setError("Failed: "+e.message);
      setVerifying(false);
    }
  };

  return <div>
    <h1 style={{fontFamily:"'Cormorant',serif",fontSize:38,fontWeight:700,margin:"0 0 10px",lineHeight:1.1}}>Log in to<br/><em style={{color:C.gold}}>Spotify</em></h1>
    <p style={{color:C.muted,fontSize:15,marginBottom:26,lineHeight:1.6}}>Follow these 3 steps in order.</p>
    <Card style={{marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.1em",color:C.muted,marginBottom:14}}>STEP 1 — GENERATE LOGIN LINK</div>
      <Btn onClick={generateLink} isGreen>{linkReady?"Regenerate Link":"Generate Login Link"}</Btn>
      {linkReady&&<div style={{marginTop:12,padding:"10px 14px",background:C.bg,borderRadius:8,border:`1px solid ${C.success}`,color:C.success,fontSize:13}}>✓ Link ready — continue to step 2</div>}
    </Card>
    {linkReady&&<>
      <Card style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.1em",color:C.muted,marginBottom:14}}>STEP 2 — LOG IN TO SPOTIFY</div>
        <a href={authUrl} target="_blank" rel="noreferrer" style={{display:"block",textDecoration:"none"}}>
          <div style={{background:C.green,color:"#fff",fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:16,padding:"15px",borderRadius:10,textAlign:"center"}}>Open Spotify Login →</div>
        </a>
        <div style={{marginTop:12,fontSize:13,color:C.muted,lineHeight:1.6}}>Log in and tap <b style={{color:C.text}}>Agree</b>. You'll land on a plain white page — that's correct.</div>
      </Card>
      <Card style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.1em",color:C.muted,marginBottom:14}}>STEP 3 — COPY URL &amp; PASTE HERE</div>
        <div style={{fontSize:14,color:C.text,lineHeight:1.7,marginBottom:14}}>
          On the white page, tap the address bar and copy the full URL:<br/>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:C.muted,background:C.bg,padding:"8px 12px",borderRadius:7,display:"block",marginTop:8}}>https://example.com/?code=AQ...</span>
        </div>
        <Inp value={codeInput} onChange={setCodeInput} placeholder="https://example.com/?code=..." mono/>
        {error&&<div style={{marginTop:12,color:C.error,fontSize:13,padding:"10px 14px",background:"#1a0f0f",borderRadius:8,border:`1px solid ${C.error}`}}>{error}</div>}
        <div style={{marginTop:14}}><Btn onClick={handleVerify} disabled={!codeInput.trim()||verifying}>{verifying?"Verifying…":"Verify & Continue →"}</Btn></div>
      </Card>
    </>}
  </div>;
}

// ── Step 3: Prompt ─────────────────────────────────────────
function StepPrompt({onGenerate}){
  const [prompt,setPrompt]=useState("");
  const [name,setName]=useState("");
  const examples=["Late night drive, melancholic and cinematic","Sunday morning coffee, jazz and acoustic","80s movie training montage","Autumn forest walk, folk and instrumental","Pre-match warmup, aggressive and focused"];
  return <div>
    <h1 style={{fontFamily:"'Cormorant',serif",fontSize:38,fontWeight:700,margin:"0 0 10px",lineHeight:1.1}}>Describe your<br/><em style={{color:C.gold}}>playlist</em></h1>
    <p style={{color:C.muted,fontSize:15,marginBottom:28,lineHeight:1.6}}>Write a mood, a moment, or a vibe. Claude picks the songs.</p>
    <div style={{marginBottom:18}}><Lbl>What's the vibe?</Lbl><Inp value={prompt} onChange={setPrompt} placeholder="e.g. Rainy evening in Zagreb, nostalgic and slow…" multiline/></div>
    <div style={{marginBottom:26}}><Lbl>Playlist name (optional)</Lbl><Inp value={name} onChange={setName} placeholder="Leave blank to auto-generate"/></div>
    <div style={{marginBottom:30}}>
      <div style={{fontSize:11,color:C.muted,letterSpacing:"0.08em",marginBottom:10}}>EXAMPLES — tap to use</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {examples.map(ex=>(
          <button key={ex} onClick={()=>setPrompt(ex)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:13,padding:"7px 13px",cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all 0.15s"}}
            onMouseEnter={e=>{e.target.style.borderColor=C.gold;e.target.style.color=C.text;}}
            onMouseLeave={e=>{e.target.style.borderColor=C.border;e.target.style.color=C.muted;}}>{ex}</button>
        ))}
      </div>
    </div>
    <Btn onClick={()=>onGenerate(prompt,name)} disabled={!prompt.trim()}>Generate Playlist ✦</Btn>
  </div>;
}

// ── Step 4: Generating ─────────────────────────────────────
function StepGenerating({logs}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[logs]);
  const col=t=>({success:C.success,miss:C.miss,error:C.error,busy:C.goldLight}[t]||C.text);
  const icon=t=>({success:"✓",miss:"–",error:"✗",busy:"⟳"}[t]||" ");
  return <div>
    <h1 style={{fontFamily:"'Cormorant',serif",fontSize:38,fontWeight:700,margin:"0 0 10px",lineHeight:1.1}}>Building<br/><em style={{color:C.gold}}>your playlist…</em></h1>
    <p style={{color:C.muted,fontSize:15,marginBottom:28}}>About 20–40 seconds.</p>
    <div style={{display:"flex",justifyContent:"center",marginBottom:26}}>
      <svg width="80" height="80" viewBox="0 0 80 80" style={{animation:"spin 3s linear infinite"}}>
        {[34,27,20,13,7].map(r=><circle key={r} cx="40" cy="40" r={r} fill="none" stroke={C.gold} strokeWidth="0.8" opacity="0.4"/>)}
        <circle cx="40" cy="40" r="4" fill={C.gold} opacity="0.9"/>
        <circle cx="40" cy="40" r="1.5" fill={C.bg}/>
      </svg>
    </div>
    <Card>
      <div ref={ref} style={{fontFamily:"'DM Mono',monospace",fontSize:13,lineHeight:1.85,maxHeight:280,overflowY:"auto"}}>
        {logs.length===0?<span style={{color:C.muted}}>Starting…</span>:logs.map(l=><div key={l.id} style={{color:col(l.t)}}>{icon(l.t)} {l.m}</div>)}
      </div>
    </Card>
  </div>;
}

// ── Step 5: Result ─────────────────────────────────────────
function StepResult({tracks,playlistId,onReset}){
  return <div>
    <h1 style={{fontFamily:"'Cormorant',serif",fontSize:38,fontWeight:700,margin:"0 0 10px",lineHeight:1.1}}>Done! <em style={{color:C.gold}}>✦</em></h1>
    <p style={{color:C.muted,fontSize:15,marginBottom:24,lineHeight:1.6}}>{tracks.length} tracks added to your Spotify.</p>
    <div style={{display:"flex",gap:10,marginBottom:32,flexWrap:"wrap"}}>
      <Btn isGreen onClick={()=>window.open(`https://open.spotify.com/playlist/${playlistId}`,"_blank")}>Open in Spotify →</Btn>
      <Btn outline onClick={onReset}>New playlist</Btn>
    </div>
    <div style={{fontSize:11,color:C.muted,letterSpacing:"0.08em",marginBottom:12}}>TRACKS</div>
    <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:36}}>
      {tracks.map((t,i)=>(
        <div key={t.id} style={{display:"flex",alignItems:"center",gap:12,background:C.surface,borderRadius:10,padding:"10px 13px",border:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace",width:20,textAlign:"right",flexShrink:0}}>{String(i+1).padStart(2,"0")}</div>
          {t.album?.images?.[2]?.url&&<img src={t.album.images[2].url} alt="" style={{width:34,height:34,borderRadius:4,objectFit:"cover",flexShrink:0}}/>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.name}</div>
            <div style={{fontSize:12,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.artists?.map(a=>a.name).join(", ")}</div>
          </div>
          <div style={{fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace",flexShrink:0}}>{Math.floor(t.duration_ms/60000)}:{String(Math.floor((t.duration_ms%60000)/1000)).padStart(2,"0")}</div>
        </div>
      ))}
    </div>
  </div>;
}

// ── Root ───────────────────────────────────────────────────
function App(){
  const [step,setStep]=useState("setup");
  const [clientId,setClientId]=useState("");
  const [accessToken,setAccessToken]=useState("");
  const [userId,setUserId]=useState("");
  const [logs,setLogs]=useState([]);
  const [tracks,setTracks]=useState([]);
  const [playlistId,setPlaylistId]=useState(null);

  useEffect(()=>{
    const id=localStorage.getItem("sp_client_id");
    const v=localStorage.getItem("sp_verifier");
    if(id)setClientId(id);
    if(id&&v)setStep("auth");
  },[]);

  const log=(m,t="info")=>setLogs(p=>[...p,{m,t,id:Math.random()}]);

  const handleReset=()=>{
    ["sp_verifier","sp_auth_url","sp_client_id","groq_key"].forEach(k=>localStorage.removeItem(k));
    setStep("setup");setClientId("");setAccessToken("");setUserId("");setLogs([]);setTracks([]);setPlaylistId(null);
  };

  const handleAuthSuccess=(token,uid)=>{setAccessToken(token);setUserId(uid);setStep("prompt");};

  const handleGenerate=async(prompt,name)=>{
    setStep("generating");setLogs([]);setTracks([]);
    try{
      log("Asking Claude for songs…","busy");
      const songs=await callGroq(prompt);
      log(`Got ${songs.length} suggestions`,"success");
      log("Searching Spotify catalog…","busy");
      const found=[];
      for(const s of songs){
        const track=await searchTrack(s.artist,s.title,accessToken);
        if(track){found.push(track);log(`${track.artists[0].name} — ${track.name}`,"success");}
        else{log(`Not found: ${s.artist} — ${s.title}`,"miss");}
        await new Promise(r=>setTimeout(r,100));
      }
      setTracks(found);
      if(!found.length)throw new Error("No tracks found. Try a different description.");
      const finalName=name.trim()||`✦ ${prompt.slice(0,45)}${prompt.length>45?"…":""}`;
      log(`Creating "${finalName}"…`,"busy");
      const pl=await sPost(`/users/${userId}/playlists`,{name:finalName,public:false,description:`Generated from: ${prompt}`},accessToken);
      if(pl.error)throw new Error(pl.error.message);
      log("Playlist created!","success");
      log(`Adding ${found.length} tracks…`,"busy");
      const uris=found.map(t=>t.uri);
      for(let i=0;i<uris.length;i+=100)await sPost(`/playlists/${pl.id}/tracks`,{uris:uris.slice(i,i+100)},accessToken);
      log("All done! 🎉","success");
      setPlaylistId(pl.id);setStep("result");
    }catch(e){log(`Error: ${e.message}`,"error");}
  };

  return <Shell step={step} onReset={handleReset}>
    {step==="setup"&&<StepSetup onNext={id=>{setClientId(id);setStep("auth");}}/>}
    {step==="auth"&&<StepAuth clientId={clientId} onSuccess={handleAuthSuccess}/>}
    {step==="prompt"&&<StepPrompt onGenerate={handleGenerate}/>}
    {step==="generating"&&<StepGenerating logs={logs}/>}
    {step==="result"&&<StepResult tracks={tracks} playlistId={playlistId} onReset={()=>setStep("prompt")}/>}
  </Shell>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
